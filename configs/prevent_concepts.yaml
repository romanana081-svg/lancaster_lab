# prevent_concepts.yaml — the codes behind each PREVENT input. D-004, D-013, T-017.
#
# WE MATCH ON CODES, NOT CONCEPT IDs.
#
# Concept IDs are unstable across CDR versions and meaningless to read; the vocabulary codes (LOINC,
# ICD10CM, RxNorm) are stable and self-describing. Matching on codes and resolving to IDs at query
# time is what makes the definition reviewable -- and it is why `01_prevent_concept_discovery.sql`
# exists: it CONFIRMS each code resolves before anything depends on it. A code that does not resolve
# returns zero rows with no error, which is how a phenotype silently empties (D-014).
#
# STATUS: the LOINC codes below are the standard ones. As of T-004 (2026-07-20) ALL of them are
# seeded in the fixture and 01_prevent_concept_discovery.sql resolves every one offline. That is a
# FIXTURE fact, not a data finding: ALL OF THEM MUST STILL BE VERIFIED AGAINST THE REAL CDR with the
# discovery query before the completeness counts are trusted. Do not skip that step.

# IMPORTANT LINKAGE FACT (verified in the fixture 2026-07-14, and true of the real CDR):
#   ICD10CM codes  -> condition_occurrence.condition_source_concept_id
#   CPT4  codes    -> procedure_occurrence.procedure_source_concept_id
#   the *_concept_id (standard) columns map to SNOMED, NOT to ICD/CPT.
# Querying condition_concept_id for an ICD code returns NOTHING, silently. This is not hypothetical.

measurements:                      # -> measurement, via LOINC
  total_cholesterol:
    loinc: ["2093-3"]
    unit: mg/dL
    status: VERIFY                 # present in fixture (concept 3008631)
  hdl_c:
    loinc: ["2085-9"]
    unit: mg/dL
    status: VERIFY                 # present in fixture (concept 3007352)
  systolic_bp:
    loinc: ["8480-6"]
    unit: mmHg
    status: IN_FIXTURE   # T-004 (2026-07-20): seeded; still VERIFY against real CDR
    note: "All of Us also carries BP in physical measurements; check both sources before concluding
           a participant has no SBP."
  serum_creatinine:
    loinc: ["2160-0"]
    unit: mg/dL
    status: IN_FIXTURE   # T-004 (2026-07-20): seeded; still VERIFY against real CDR
    note: "eGFR is DERIVED from this via CKD-EPI 2021 (race-free). It is not itself a PREVENT input."
  bmi:
    loinc: ["39156-5"]
    unit: kg/m2
    status: VERIFY                 # present in fixture (concept 3038553)
  hba1c:
    loinc: ["4548-4", "17856-6"]
    unit: "%"
    status: IN_FIXTURE   # T-004 (2026-07-20): seeded; still VERIFY against real CDR
    note: "Only needed for EXTENDED PREVENT, and for defining diabetes. Every extra required input
           SHRINKS the cohort under complete-case (D-013), so this belongs to the model_variant
           decision (H-002), not to the base panel by default."

conditions:                        # -> condition_occurrence.condition_source_concept_id, via ICD10CM
  diabetes:
    # ADVISOR DEFINITION (2026-07-21): diabetes := most-recent HbA1c >= 6.8% AND >= 1 glucose-lowering
    # medication. BOTH limbs required. This is what extract_prevent.R implements (dm column). The old
    # ICD10CM diagnosis-code path is retained below only for the discovery/completeness SQL and the
    # has_diabetes_dx audit column -- it is NO LONGER the phenotype definition.
    definition: "hba1c_ge_6.8_AND_glucose_lowering_med"
    hba1c_threshold: 6.8           # advisor's operational cut (NB: ADA clinical cut is 6.5%)
    requires_medication: true
    icd10_prefix: ["E08", "E09", "E10", "E11", "E13"]   # audit-only (has_diabetes_dx), not the definition
    status: IN_FIXTURE   # T-004 (2026-07-20): seeded; definition set 2026-07-22; VERIFY med list (sql/05)
    note: "The three ascertainments (diagnosis code, HbA1c, glucose-lowering drug) identify DIFFERENT
           people. The advisor chose HbA1c>=6.8 AND a med (the intersection of two of them). NB the
           medication INGREDIENT list is PROVISIONAL until confirmed against the AoU drug hierarchy --
           see drugs.diabetes_medication below and sql/05_diabetes_med_discovery.sql. Until then the
           dm flag is stamped in the panel's placeholder_inputs."

drugs:                             # -> drug_exposure, via RxNorm
  diabetes_medication:
    # The medication limb of the advisor diabetes definition. Matched to glucose-lowering INGREDIENTS
    # via concept_ancestor (same mechanism as statins). PROVISIONAL: the ingredient set hardcoded in
    # extract_prevent.R (.DM_MED_INGREDIENTS, anchored on metformin 1503297) MUST be confirmed against
    # the AoU drug hierarchy before dm is trusted -- run sql/05_diabetes_med_discovery.sql and reconcile.
    rxnorm_ingredients: [1503297]  # metformin (anchor); full class in extract_prevent.R, all PROVISIONAL
    classes: ["biguanide", "sulfonylurea", "insulin", "DPP-4", "SGLT2", "GLP-1", "TZD", "meglitinide"]
    status: PROVISIONAL            # confirm via sql/05 before flipping to VERIFIED
    note: "metformin is used for other indications (PCOS, prediabetes), so the med limb alone over-calls
           diabetes -- which is exactly why the definition ALSO requires HbA1c>=6.8. Confirm the full
           ingredient set against the AoU hierarchy (sql/05); do not treat the starter list as final."
  antihypertensive:
    rxnorm_ingredients: []         # DELIBERATELY EMPTY -- see note
    status: NEEDS_A_CODE_LIST
    note: "Antihypertensive use is a PREVENT input, and there is no single code for it: it is a large
           class (ACE inhibitors, ARBs, thiazides, CCBs, beta blockers...). Do NOT improvise this list
           from memory. Pull the ingredient set from the All of Us drug hierarchy (cb_criteria /
           concept_ancestor) and record what was pulled. A partial list silently misclassifies treated
           hypertensives as untreated, which biases a PREVENT input directly.
           FIXTURE NOTE (T-004): the fixture seeds two ILLUSTRATIVE ingredients (lisinopril,
           hydrochlorothiazide) on participants 1000028/1000032 so a future extractor has rows to find.
           That is scaffolding, NOT the authoritative list -- this entry stays NEEDS_A_CODE_LIST."

surveys:                           # -> ds_survey / observation
  current_smoking:
    question_concept_id: 1585860   # "Smoking: Smoke Frequency" -- CONFIRMED by sql/03 (2026-07-21)
    answer_map_provisional:        # provisional until the answer_concept_ids are frozen in the meeting
      current: [1585863, 1585861]  # Every Day / Some Days
      former:  [1585862]           # Not at all (with 100-cigs-lifetime = Yes)
    status: ANSWERS_PROVISIONAL    # question pinned; answer coding not yet frozen (was NEEDS_MAPPING)
    note: "Smoking in All of Us is primarily SURVEY-derived (The Basics / Lifestyle), not EHR-derived.
           That matters for completeness: a participant with a rich EHR but no completed survey has NO
           smoking status and is therefore EXCLUDED under complete-case (D-013). This may be the
           single biggest driver of exclusion, and T-017 is what will tell us.
           FIXTURE NOTE (T-004): the fixture seeds smoking answers in ds_survey (question_concept_id
           1585857) on participants 1000028/1000032. The real question/answer mapping is still open --
           this entry stays NEEDS_MAPPING; the fixture rows are only so an extractor has something to
           read. Note smoking is NOT yet in 02_prevent_panel_completeness.sql's complete-panel flag."
